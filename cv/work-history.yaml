      end: "2026-05"
      label: "2024 – May 2026"
    location: "Atlanta, GA (Hybrid)"
    engagement_type: "fte"
    scope: >-
      Multi-squad Chapter Leader. Led Fidelity Brokerage's agentic-AI
      transformation — operationalizing agentic development across the org (the
      "AI Innovation" workstream) while running engineering for AIDE, an AI
      "single pane of glass" consolidating 14+ servicing tools and dozens of
      back-end systems for 8,900 call-center associates, targeting $175M in
      average-handle-time savings over five years.
    responsibilities:
      - "Operationalized agentic development across the brokerage org as the AI Innovation workstream lead."
      - "Ran engineering for AIDE, consolidating 14+ servicing tools and dozens of back-end systems into a single associate-facing pane of glass."
