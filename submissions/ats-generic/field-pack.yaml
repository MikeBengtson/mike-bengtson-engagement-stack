summary: >-
  AI engineering leader with two decades building production platforms and now
  personally architecting the agentic-AI toolchains that make engineering teams
  dramatically faster. Equally at home leading multi-squad organizations against
  nine-figure KPIs and pairing with engineers in the codebase via Claude Code,
  Codex, MCP, and RAG. Scaled platforms from zero to millions of users, doubled
  engineering capacity under deadline, and shipped agentic development that cut
  some delivery cycles from three months to a two-week sprint. Creator and
  maintainer of gemba-core, an open-source framework for parallel agentic
  development.

