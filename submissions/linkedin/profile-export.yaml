about: >-
  AI engineering leader with two decades building production platforms — now
  personally architecting the agentic-AI toolchains that make engineering
  organizations dramatically faster. Equally at home leading multi-squad
  organizations against nine-figure KPIs and pairing with engineers in the
  codebase through Claude Code, Codex, MCP servers, and RAG — having scaled
  platforms from zero to millions of users, doubled engineering capacity under
  deadline, and shipped agentic development that cut some delivery cycles from
  three months to a two-week sprint. At Fidelity, led Brokerage's agentic-AI
  transformation — the enterprise's agentic-development practice and the $175M
  AIDE servicing platform — after first rescuing a stalled data platform and
  scaling it from 0 to 7M+ users. Creator and maintainer of gemba-core, an
  open-source framework for parallel agentic development.

