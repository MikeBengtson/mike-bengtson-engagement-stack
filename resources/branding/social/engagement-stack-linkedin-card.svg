<svg width="1200" height="627" viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Engagement Stack — CV, Portfolio, Evidence, Offers, Resume Shaders">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d3a"/>
      <stop offset="100%" stop-color="#1c2e4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5b942"/>
      <stop offset="100%" stop-color="#e6913f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- decorative geometry matching the job-search-superpower family -->
  <circle cx="1050" cy="120" r="170" fill="#f5b942" opacity="0.06"/>
  <circle cx="980" cy="600" r="220" fill="#f5b942" opacity="0.04"/>
  <circle cx="1100" cy="290" r="5" fill="#f5b942" opacity="0.6"/>
  <circle cx="1130" cy="330" r="3" fill="#f5b942" opacity="0.4"/>
  <circle cx="1070" cy="360" r="4" fill="#f5b942" opacity="0.5"/>

  <!-- accent bar left of title -->
  <rect x="80" y="178" width="8" height="185" fill="url(#accent)"/>

  <!-- Title — two lines for social card crop safety -->
  <text x="115" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-1">Engagement</text>
  <text x="115" y="324" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-1">Stack</text>

  <!-- Pipe-separated subtitle -->
  <text x="115" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#f5b942" letter-spacing="0.5">CV  |  Portfolio  |  Evidence  |  Offers  |  Shaders</text>

  <!-- Description -->
  <text x="115" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#cbd5e1">A human-first, agent-readable Career OS</text>
  <text x="115" y="487" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#cbd5e1">for source-controlled professional life.</text>

  <!-- meta footer -->
  <line x1="115" y1="540" x2="520" y2="540" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="115" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#94a3b8">Mike Bengtson  ·  MIT</text>
</svg>
