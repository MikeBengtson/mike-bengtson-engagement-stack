name: Validate Stack

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: sh scripts/validate-stack.sh

      - name: Parse YAML files
        run: |
          ruby -e 'require "yaml"; Dir["**/*.{yaml,yml}"].each { |f| YAML.load_file(f); puts "ok #{f}" }'
