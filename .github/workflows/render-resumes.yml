name: Render Resumes

# Renders the navy-themed resume + cover-letter variants (and ATS DOCX/TXT)
# with no local setup required. Artifacts are uploaded for download.

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which variant(s) to render
        required: false
        default: all
        type: choice
        options: [all, short, long, cover-letter, ats]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Set up Chromium (for designed PDF rendering)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Render variants
        run: |
          chmod +x scripts/render-resumes.sh
          scripts/render-resumes.sh "${{ inputs.target }}"

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendered-resumes
          path: generated/resumes/
          if-no-files-found: warn
