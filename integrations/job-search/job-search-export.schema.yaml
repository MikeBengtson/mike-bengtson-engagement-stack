schema: job_search_export/v1
agent_surface: true
status: draft_contract

report_markdown: job-search-report.md

fields:
  summary:
    type: string
  target_roles:
    type: list
  target_industries:
    type: list
  industry_classifications:
    type: list
  transferable_skills:
    type: list
  employment_type_recommendations:
    type: list
  compensation_preferences:
    type: map
    item_shape:
      annual_salary_min: number_or_null
      annual_salary_target: number_or_null
      annual_salary_max: number_or_null
      hourly_rate_min: number_or_null
      hourly_rate_target: number_or_null
      hourly_rate_max: number_or_null
      hourly_rate_basis: string
      notes: string
  geographic_preferences:
    type: map
  resume_recommendations:
    type: list
  resume_shader_recommendations:
    type: list
    item_shape:
      name: string
      slug: string
      description: string
      rationale: string
      target:
        role: string
        industry: string
        seniority: string
        platform: string
      emphasize: list
      deemphasize: list
      preferred_terms: list
      avoid_terms: list
      evidence_gaps: list
      source_report_sections: list
  linkedin_recommendations:
    type: list
  next_steps:
    type: list
  canonical_fact_updates_requiring_review:
    type: list
  evidence_gaps:
    type: list
