schema: engagement_preferences/v1
agent_surface: true
canonical_markdown: current-preferences.md
visibility: public

# Public-safe only. No salary, rate, or numeric thresholds here.
# Compensation floors/targets/premiums live in private/compensation.private.yaml.

availability:
  status: available                      # earliest start / availability confirmed
  starts_after: "2026-07-01"             # earliest start / availability: July 1, 2026
  weekly_capacity_hours: "8-16"          # fractional/advisory weekly capacity

location:
  base: Atlanta, GA
  timezone: America/New_York             # US Eastern (ET)
  relocation:
    acceptable: false                    # dealbreaker — any relocation is an automatic no
  remote:
    acceptable: true                     # preferred
    score_placeholder: 100
  hybrid_local:                          # local to Atlanta
    acceptable: conditional              # only if local to Atlanta and not full/mandatory in-office
    score_placeholder: 70
  full_time_in_office:
    acceptable: false                    # dealbreaker — mandatory/full in-office is an automatic no
    score_placeholder: 0

# Mike is open to all four named engagement models below.
# The five keys retained from the schema map onto those models for the scorer.
engagement_types:
  full_time:                             # FTE
    acceptable: true
  hourly_contract:                       # contract / consulting (time-based)
    acceptable: true
  fixed_bid:                             # contract / consulting (scoped/outcome build)
    acceptable: true
  advisory_fractional:                   # fractional leadership + advisory / board
    acceptable: true
    preferred: true                      # fractional / advisory are preferred shapes
  assignment_consignment_outcome:
    acceptable: false                    # not offered; sticks to salary/hourly/retainer/fixed-bid

# Human-facing model grouping (see engagement-models.md for details).
# Fractional / part-time leadership and advisory / board are the preferred shapes.
engagement_models_open:
  - full_time
  - fractional_part_time_leadership      # preferred
  - contract_consulting
  - advisory_board                       # preferred

# Compensation structures Mike will work under. Figures live in the private overlay.
comp_structures:
  accepted:                              # salary / hourly / retainer / fixed-bid
    - salary
    - hourly
    - retainer
    - fixed_bid
  not_accepted:                          # outcome/success-fee and assignment/consignment-based
    - outcome_success_fee
    - assignment_consignment

# The three priorities below are all top priority (co-equal).
offer_evaluation_priorities:
  - id: true_agentic_pipeline
    priority: top
    public: true
    note: Working on a true agentic pipeline.
  - id: org_wide_ai_impact
    priority: top
    public: true
    note: The chance for organization-wide impact with AI efforts.
  - id: income_to_expectations
    priority: top
    public: false
    note: Income/revenue in keeping with his expectations; figures live in the private overlay (private/compensation.private.yaml).

dealbreakers:                            # automatic no; sensitive ones live in private/constraints.private.yaml
  - mandatory or full in-office
  - any relocation
  - travel above 10%
dealbreakers_status: on_record
