    org: GembaCore
    role: creator / maintainer
    license: MIT
    languages: [Go, TypeScript, React]
    description: Agent orchestration dashboard — Kanban UI for any work tracker × any agent runtime.
    supports_projects: [gemba-core, aide]
    public: true
  - name: MikeBengtson (GitHub profile)
    url: https://github.com/MikeBengtson
    role: account owner
    description: Mike's GitHub profile; gemba-core is pinned.
    public: true

live_products:
